<body>
    <!--Nav Bar -->
    <div class="navbar">
        <!-- Logo -->
        <div class="container flex">
            <h1 class="logo">About Me.</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Me</a></li>

                </ul>
            </nav>
        </div>
    </div>

    <!-- Head -->
    <div class="contacts-head bg-primary py-3">
        <div class="container grid">
            <div>
                <h1 class="xl">Contact</h1>
                <p class="lead">
                    Reach out and let's create something amazing together
                </p>
            </div>
            <!-- <i class="fa-solid fa-book fa-8x"></i> -->
                <img src="images/contact.png" alt="">
        </div>
    </div>
    <!-- Contact Form -->
    <section class="contacts-main my-4">
        <div class="container flex">
            <div class="showcase-form card" id="formDiv">
                <h2>Contact Form</h2>
                <!--form post to Netlify & Spam protection using netlify honey pot: BOT-->
                <div class="error"></div>
                <form id="contactForm" action="https://api.web3forms.com/submit" name="contact" method="POST">
                    <!--Hidden input or field-->
                    <!--<input type="hidden" name="access_key" value="2c6d1e72-1af2-4d55-9d9c-9933ecf7a825"> -->
                    <input type="hidden" name="access_key" value="c94b586f-e0b4-4f9d-8fdd-6672dc62705e">
                    <!--Spam Protection using honey pot method, where we create an input,
                    that we can hide and you dont fill it out if youre human, 
                    a bot will fill it out.
                    This hiden class will show up, we need to hide it using css-->
                    <p class="hidden">
                        <label>Don't fill this out if you're human: <input name="bot-field"></label>
                    </p>
                    <div class="form-control">
                        <input type="text" name="name" placeholder="Name" required>
                    </div>
                    <div class="form-control">
                        <input type="text" name="company" placeholder="Company Name">
                    </div>
                    <div class="form-control">
                        <input type="text" name="email" placeholder="Email" size="42" required>
                    </div>
                    <div class="form-control">
                        <textarea class="msg" type="text" name="message" placeholder="Message"></textarea>
                    </div>
                    <input type="submit" value="Send" class="btn btn-primary">
                </form>
            </div>
        </div>
        <h1 id="hiddenMsg">Thank You.</h1>
    </section>
  
     <!-- Footer -->
